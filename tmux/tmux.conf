# Keymaps
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.config/tmux/tmux.conf \; display-message 'Config reloaded!'
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-H swap-window -t -1 \; select-window -t -1
bind -n M-L swap-window -t +1 \; select-window -t +1
bind '-' split-window -v -c "#{pane_current_path}"
bind '`' split-window -v -l 25% -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"
bind '\' split-window -h -l 35% -c "#{pane_current_path}"
bind -n C-S-Up resize-pane -U 2
bind -n C-S-Down resize-pane -D 2
bind -n C-S-Left resize-pane -L 2
bind -n C-S-Right resize-pane -R 2
bind-key S new-session
bind C-s display-popup -E -w 50 -h 7 "devdeck workspace save-popup"
bind -n C-Space display-popup -E -w 60 -h 16 "devdeck workspace restore-popup"
bind K confirm-before -p "Kill tmux server? (y/n)" kill-server
bind C-k kill-window
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key t command-prompt -p "Rename pane:" "select-pane -T '%%'"

# Numbered window selection
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Plugins
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.local/share/tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'jazho76/tmux-statusline'

# Customization
setw -g mode-keys vi
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-window on
set -g status-position top
set -g status-style bg=colour235,fg=colour247
set -g default-terminal 'tmux-256color'
set -as terminal-features ',*:RGB'
set -s extended-keys on
set -g automatic-rename-format "#{?#{==:#{pane_current_path},$HOME},~,#{b:pane_current_path}}"
set -s escape-time 0
set -g history-limit 50000
set -g focus-events on
setw -g aggressive-resize on

set -g @statusline-theme "tokyonight"

if-shell "[ -f ~/.config/tmux/local.conf ]" "source-file ~/.config/tmux/local.conf"

# Initialize TPM
run-shell "$HOME/.local/share/tmux/plugins/tpm/tpm"
