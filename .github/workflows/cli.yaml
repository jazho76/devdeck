name: CLI

on:
  pull_request:
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yaml'
  push:
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yaml'

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: cli/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./...
